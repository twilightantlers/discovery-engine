<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcane</title>
  <style>
    body {
      margin: 0;
      background: #080615;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .box {
      max-width: 700px;
      margin: 30px auto;
      background: #141126;
      border: 2px solid #8b5cff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 0 25px #8b5cff;
    }

    h1 {
      text-align: center;
      color: #d9c7ff;
    }

    #chat {
      min-height: 280px;
      background: #05040d;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 15px;
      overflow-y: auto;
    }

    form {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      background: #8b5cff;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>☼ ARCANE ☼</h1>
    <p>ASCII Signal Terminal</p>

    <div id="chat"></div>

    <form id="form">
      <input id="msg" placeholder="Type here..." autocomplete="off">
      <button type="submit">SEND</button>
    </form>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");

    function add(sender, text) {
      const p = document.createElement("p");
      p.innerHTML = "<b>" + sender + ":</b> " + text;
      chat.appendChild(p);
      chat.scrollTop = chat.scrollHeight;
    }

    add("SYSTEM", "Arcane loaded.");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const text = msg.value.trim();
      if (!text) return;

      add("YOU", text);
      msg.value = "";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();
        add("ARCANE", data.reply || "No reply.");
      } catch (error) {
        add("SYSTEM", "Send failed.");
      }
    });
  </script>
</body>
</html>
