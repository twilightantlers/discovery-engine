<!DOCTYPE html>
<html>
<head>
<title>Arcane AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:radial-gradient(circle at top,#1d0f42,#03030a 70%);
  color:white;
  font-family:Arial,sans-serif;
  min-height:100vh;
  padding:20px;
}

h1{
  text-align:center;
  font-size:3rem;
  margin-bottom:25px;
  text-shadow:0 0 20px #7b2cff;
}

.container{
  max-width:1000px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.box{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  padding:22px;
  box-shadow:0 0 25px rgba(0,0,0,.4);
}

p{
  color:#ccc;
  line-height:1.5;
  margin:10px 0;
}

textarea,input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:#0b0b17;
  color:white;
  margin-bottom:12px;
  font-size:1rem;
}

textarea{
  height:140px;
  resize:none;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  font-size:1rem;
  font-weight:bold;
  color:white;
  background:linear-gradient(45deg,#7b2cff,#00d4ff);
}

.output{
  margin-top:14px;
  padding:15px;
  border-radius:14px;
  background:#05050d;
  white-space:pre-wrap;
  line-height:1.6;
}

img{
  width:100%;
  border-radius:18px;
  margin-top:14px;
}
</style>
</head>

<body>

<h1>🧠 Arcane AI</h1>

<div class="container">

  <div class="box">
    <h2>💬 AI Chat</h2>
    <p>Ask Arcane AI questions, solve problems, or build ideas.</p>

    <textarea id="chatInput" placeholder="Talk to Arcane AI..."></textarea>
    <button onclick="sendChat()">ASK ARCANE</button>

    <div id="chatOutput" class="output">Arcane AI ready...</div>
  </div>

  <div class="box">
    <h2>🎨 AI Image Generator</h2>
    <p>Describe an image and Arcane AI will create it.</p>

    <input id="imageInput" placeholder="Describe your image...">
    <button onclick="makeImage()">CREATE IMAGE</button>

    <div id="imageOutput" class="output">Image system ready...</div>
  </div>

  <div class="box">
    <h2>🌀 GIF Portal</h2>
    <p>Type a GIF idea. Arcane AI will open a moving portal.</p>

    <input id="gifInput" placeholder="Describe your GIF idea...">
    <button onclick="makeGif()">CREATE GIF PORTAL</button>

    <div id="gifOutput" class="output">GIF portal ready...</div>
  </div>

</div>

<script>
async function sendChat(){
  const message = document.getElementById("chatInput").value;
  const output = document.getElementById("chatOutput");

  output.innerText = "Arcane AI thinking...";

  try{
    const res = await fetch("/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message})
    });

    const data = await res.json();
    output.innerText = data.reply || data.error;
  }catch(err){
    output.innerText = "Connection failed.";
  }
}

async function makeImage(){
  const prompt = document.getElementById("imageInput").value;
  const output = document.getElementById("imageOutput");

  output.innerText = "Generating image...";

  try{
    const res = await fetch("/image",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    if(data.image){
      output.innerHTML = `<img src="data:image/png;base64,${data.image}">`;
    }else{
      output.innerText = data.error;
    }
  }catch(err){
    output.innerText = "Image connection failed.";
  }
}

function makeGif(){
  const prompt = document.getElementById("gifInput").value;
  const output = document.getElementById("gifOutput");

  const gifs = [
    "https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif",
    "https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif",
    "https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif",
    "https://media.giphy.com/media/26BRuo6sLetdllPAQ/giphy.gif"
  ];

  const gif = gifs[Math.floor(Math.random() * gifs.length)];

  output.innerHTML =
    `<p>🌀 Arcane AI opened a GIF portal for: ${prompt || "random signal"}</p>
     <img src="${gif}">`;
}
</script>

</body>
</html>
