<!DOCTYPE html>
<html>

<head>
  <title>The Great Beyond</title>

  <style>
    body {
      background: #0b1020;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      font-size: 50px;
    }

    p {
      font-size: 20px;
      color: #b8c0ff;
    }

    .portal {
      margin-top: 40px;
      padding: 20px;
      border: 1px solid #6f7cff;
      border-radius: 20px;
      width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    input {
      padding: 10px;
      width: 80%;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>The Great Beyond</h1>

  <p>
    A living discovery engine where chaos becomes signal.
  </p>

  <div class="portal">

    <input id="signal" placeholder="Type a signal..." />

    <br><br>

    <button onclick="discover()">Discover</button>

    <p id="result">
      Signal awaiting interpretation...
    </p>

  </div>

  <script>
    function discover() {

      const signal =
        document.getElementById("signal").value;

      const result =
        document.getElementById("result");

      if (signal.includes("moon")) {
        result.innerText =
          "Night discovery path detected 🌙";
      }

      else if (signal.includes("dream")) {
        result.innerText =
          "Dream world pathway opening ✨";
      }

      else if (signal.includes("rain")) {
        result.innerText =
          "Rain atmosphere detected ☔";
      }

      else {
        result.innerText =
          "Signal interpreted: " + signal;
      }
    }
  </script>

</body>

</html>
