<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcane</title>

  <style>
    body {
      margin: 0;
      background: #080615;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .box {
      max-width: 700px;
      margin: 40px auto;
      background: rgba(20, 17, 38, 0.95);
      border: 1px solid #8b5cff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 0 30px rgba(139, 92, 255, 0.5);
    }

    h1 {
      text-align: center;
      color: #d9c7ff;
    }

    #chat {
      height: 330px;
      overflow-y: auto;
      background: #05040d;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }

    input {
      width: 65%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #120f22;
      color: white;
    }

    button {
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #8b5cff;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>☼ ARCANE ☼</h1>
    <p>ASCII Signal Terminal</p>

    <div id="chat"></div>

    <input id="msg" placeholder="Type here..." />
    <button onclick="send()">SEND</button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const msg = document.getElementById("msg");

    function add(sender, text) {
      const p = document.createElement("p");
      p.innerHTML = "<b>" + sender + ":</b> " + text;
      chat.appendChild(p);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const text = msg.value.trim();
      if (!text) return;

      add("YOU", text);
      msg.value = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text
          })
        });

        const data = await res.json();
        add("ARCANE", data.reply || "No reply.");
      } catch (err) {
        add("SYSTEM", "Send failed.");
      }
    }

    msg.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        send();
      }
    });
  </script>
</body>
</html>
