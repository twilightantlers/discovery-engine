<!DOCTYPE html>
<html>
<head>

<title>Arcane AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
radial-gradient(circle at top,#1d0f42,#03030a 70%);
color:white;
font-family:Arial,sans-serif;
min-height:100vh;
padding:20px;
overflow-x:hidden;
}

h1{
text-align:center;
font-size:3rem;
margin-bottom:25px;
text-shadow:0 0 20px #7b2cff;
}

.container{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.box{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
border-radius:24px;
padding:22px;
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(0,0,0,.4);
}

.box h2{
margin-bottom:14px;
}

.box p{
color:#ccc;
line-height:1.6;
margin-bottom:14px;
}

textarea,input{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#0b0b17;
color:white;
margin-bottom:12px;
font-size:1rem;
}

textarea{
height:140px;
resize:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
color:white;
background:
linear-gradient(45deg,#7b2cff,#00d4ff);
box-shadow:
0 0 20px rgba(123,44,255,.5);
}

.output{
margin-top:14px;
padding:15px;
border-radius:14px;
background:#05050d;
white-space:pre-wrap;
line-height:1.6;
}

img{
width:100%;
border-radius:18px;
margin-top:14px;
}

.status{
margin-top:10px;
font-size:.9rem;
color:#8efcff;
}

</style>
</head>

<body>

<h1>🧠 Arcane AI</h1>

<div class="container">

<div class="box">

<h2>💬 AI Chat</h2>

<p>
Talk to Arcane AI and solve problems,
brainstorm ideas, learn things,
or build projects.
</p>

<textarea
id="chatInput"
placeholder="Talk to Arcane AI..."
></textarea>

<button onclick="sendChat()">
ASK ARCANE
</button>

<div
id="chatOutput"
class="output"
>
Arcane AI ready...
</div>

<div class="status">
ONLINE ∞ SAFE_MODE ACTIVE
</div>

</div>

<div class="box">

<h2>🎨 AI Image Generator</h2>

<p>
Describe any image and Arcane AI
will generate it.
</p>

<input
id="imageInput"
placeholder="Describe your image..."
>

<button onclick="makeImage()">
CREATE IMAGE
</button>

<div
id="imageOutput"
class="output"
>
Image system ready...
</div>

</div>

</div>

<script>

async function sendChat(){

const message =
document.getElementById(
"chatInput"
).value;

const output =
document.getElementById(
"chatOutput"
);

output.innerText =
"Arcane AI thinking...";

try{

const res =
await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message
})

});

const data =
await res.json();

output.innerText =
data.reply || data.error;

}catch(err){

output.innerText =
"Connection failed.";

}

}

async function makeImage(){

const prompt =
document.getElementById(
"imageInput"
).value;

const output =
document.getElementById(
"imageOutput"
);

output.innerText =
"Generating image...";

try{

const res =
await fetch("/image",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt
})

});

const data =
await res.json();

if(data.image){

output.innerHTML =
`<img src="data:image/png;base64,${data.image}">`;

}else{

output.innerText =
data.error;

}

}catch(err){

output.innerText =
"Image connection failed.";

}

}

</script>

</body>
</html>
