<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCANE AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="container">

  <h1>☼ ARCANE ☼</h1>
  <p class="subtitle">ASCII Signal Terminal</p>

  <div id="terminal" class="terminal"></div>

  <div class="inputRow">
    <input
      id="userInput"
      type="text"
      placeholder="Type signal..."
      autocomplete="off"
    />

    <button onclick="sendMessage()">SEND</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
